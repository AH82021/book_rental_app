name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  workflow_dispatch: # Allow manual triggering

env:
  JAVA_VERSION: "17"
  MAVEN_CLI_OPTS: "--batch-mode --errors --fail-at-end --show-version"
  DOCKER_REGISTRY: ghcr.io
  DOCKER_ORG: ${{ github.repository_owner }}

jobs:
  # ────────────────────────────────────────────────────
  # Job 1: Build and Test
  # ────────────────────────────────────────────────────
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_PASSWORD: password
          POSTGRES_USER: postgres
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      mongodb:
        image: mongo:6.0
        ports:
          - 27017:27017

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: "temurin"
          cache: maven

      - name: Compile
        run: ./mvnw clean compile ${{ env.MAVEN_CLI_OPTS }}

      - name: Run Unit Tests
        run: ./mvnw test ${{ env.MAVEN_CLI_OPTS }} -Dsurefire.failIfNoSpecifiedTests=false

      - name: Run Integration Tests
        run: |
          ./mvnw verify -P integration-tests ${{ env.MAVEN_CLI_OPTS }} \
            -Dspring.datasource.url=jdbc:postgresql://localhost:5432/testdb \
            -Dspring.datasource.username=postgres \
            -Dspring.datasource.password=password \
            -Dspring.redis.host=localhost \
            -Dspring.redis.port=6379 \
            -Dsurefire.failIfNoSpecifiedTests=false

      - name: Package JARs
        run: ./mvnw package -DskipTests ${{ env.MAVEN_CLI_OPTS }}

      - name: Upload JARs
        uses: actions/upload-artifact@v4
        with:
          name: service-jars
          path: "*/target/*.jar"
          retention-days: 1

  # ────────────────────────────────────────────────────
  # Job 2: Build & Push Docker Images
  # ────────────────────────────────────────────────────
  build-docker:
    name: Build Docker Images
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.event_name == 'push'

    strategy:
      matrix:
        service: [auth-service, user-service, book-service]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Download JARs
        uses: actions/download-artifact@v4
        with:
          name: service-jars

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.DOCKER_REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_REGISTRY }}/${{ env.DOCKER_ORG }}/${{ matrix.service }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=${{ github.ref_name }}-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./${{ matrix.service }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ────────────────────────────────────────────────────
  # Job 3: Deploy to Staging (Example)
  # ────────────────────────────────────────────────────
  deploy-staging:
    name: Deploy to Staging
    needs: build-docker
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/develop'
    environment: staging

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        run: |
          echo "Triggering deployment to staging server..."
          # This would typically use appleboy/ssh-action or similar
          # to run your jenkins/scripts/deploy.sh on the target server
          echo "Deployment successful."
