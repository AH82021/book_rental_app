services:
  # ─── Auth Service ─────────────────────────────────────────
  auth-service:
    image: ${DOCKER_REGISTRY:-docker.io}/${DOCKER_ORG:-bookstore}/auth-service:${IMAGE_TAG:-latest}
    container_name: staging-auth-service
    restart: unless-stopped
    build: {} # Disable build context from base compose
    environment:
      - SPRING_PROFILES_ACTIVE=staging
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/authdb
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD:-password}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8088/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ─── User Service ─────────────────────────────────────────
  user-service:
    image: ${DOCKER_REGISTRY:-docker.io}/${DOCKER_ORG:-bookstore}/user-service:${IMAGE_TAG:-latest}
    container_name: staging-user-service
    restart: unless-stopped
    build: {}
    environment:
      - SPRING_PROFILES_ACTIVE=staging
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/userdb
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD:-password}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ─── Book Service ─────────────────────────────────────────
  book-service:
    image: ${DOCKER_REGISTRY:-docker.io}/${DOCKER_ORG:-bookstore}/book-service:${IMAGE_TAG:-latest}
    container_name: staging-book-service
    restart: unless-stopped
    build: {}
    environment:
      - SPRING_PROFILES_ACTIVE=staging
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/bookdb
      - SPRING_DATASOURCE_USERNAME=postgres
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD:-password}
      - SPRING_REDIS_HOST=redis
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Future services will go here
