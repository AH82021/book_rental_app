# ============================================================
# SonarQube Project Configuration — book-nest
# ============================================================

sonar.projectKey=book-nest
sonar.projectName=Book Nest Platform
sonar.projectVersion=1.0.0

sonar.sourceEncoding=UTF-8

# Active modules
sonar.modules=auth-service,user-service,book-service

# ─── Module: Auth Service ────────────────────────────────────
auth-service.sonar.projectName=Auth Service
auth-service.sonar.projectBaseDir=auth-service
auth-service.sonar.sources=src/main/java
auth-service.sonar.tests=src/test/java
auth-service.sonar.java.binaries=target/classes
auth-service.sonar.java.test.binaries=target/test-classes
auth-service.sonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml

# ─── Module: User Service ────────────────────────────────────
user-service.sonar.projectName=User Service
user-service.sonar.projectBaseDir=user-service
user-service.sonar.sources=src/main/java
user-service.sonar.tests=src/test/java
user-service.sonar.java.binaries=target/classes
user-service.sonar.java.test.binaries=target/test-classes
user-service.sonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml

# ─── Module: Book Service ────────────────────────────────────
book-service.sonar.projectName=Book Service
book-service.sonar.projectBaseDir=book-service
book-service.sonar.sources=src/main/java
book-service.sonar.tests=src/test/java
book-service.sonar.java.binaries=target/classes
book-service.sonar.java.test.binaries=target/test-classes
book-service.sonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml

# ─── Exclusions ──────────────────────────────────────────────
sonar.exclusions=**/target/**,**/generated/**,**/*Application.java,**/*Config.java,**/dto/**,**/entity/**,**/model/**
sonar.test.exclusions=**/target/**
sonar.java.coveragePlugin=jacoco
