spring.application.name=book-service
spring.datasource.url=jdbc:postgresql://localhost:5432/book_service
spring.datasource.username=postgres
spring.datasource.password=****
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
management.endpoints.web.exposure.include=health,info,metrics
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
#spring.datasource.url=jdbc:postgresql://host.docker.internal:5432/book_service
server.port=8082

# Custom path for Swagger UI (Default is /swagger-ui.html)
springdoc.swagger-ui.path=/book-service/swagger-ui.html

# Custom path for the OpenAPI spec in JSON (Default is /v3/api-docs)
springdoc.api-docs.path=/api-docs


spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.timeout=2000
spring.cache.type=redis